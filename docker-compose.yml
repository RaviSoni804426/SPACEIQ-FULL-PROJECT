services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spacebook
      POSTGRES_USER: spacebook
      POSTGRES_PASSWORD: spacebook_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacebook -d spacebook"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./spaceiq/backend
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://spacebook:spacebook_local@postgres:5432/spacebook
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-this-before-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_MINUTES: "20160"
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ""
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ""
      GOOGLE_PLACES_API_KEY: ""
      GOOGLE_OAUTH_CLIENT_ID: ""
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
      OPENAI_API_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./spaceiq/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ""
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ""
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ""
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
